<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Cricket Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { overflow-x: hidden; }
        
        /* Navbar */
        .header { position: fixed; top: 0; width: 100%; background: linear-gradient(90deg, #1E3A8A, #3B82F6, #0EA5E9); z-index: 1000; }
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 5%; }
        .logo h2 { color: #FFD700; font-size: 1.8rem; }
        .menu { display: flex; list-style: none; }
        .menu li { margin: 0 1rem; }
        .menu a { color: white; text-decoration: none; padding: 0.5rem; border-bottom: 2px solid transparent; transition: 0.3s; }
        .menu a:hover { border-bottom-color: #FFD700; }
        .hamburger { display: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        /* Hero */
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1920x1080/1E3A8A/FFD700?text=Royal+Cricket+Club+Ground') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; color: white; margin-top: 70px; }
        .intro h3 { font-size: 1.5rem; margin-bottom: 1rem; }
        .intro h1 { font-size: 3.5rem; margin-bottom: 1rem; color: #FFD700; }
        .intro p { font-size: 1.2rem; margin-bottom: 2rem; max-width: 600px; }
        .btn { padding: 1rem 2rem; margin: 0 1rem; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .common-btn { background: #FFD700; color: #1E3A8A; }
        .common-btn:hover { background: #FBBF24; transform: scale(1.05); }
        .ghost-btn { background: transparent; color: white; border: 2px solid white; }
        .ghost-btn:hover { background: white; color: #1E3A8A; }
        
        /* Sections */
        section { padding: 5rem 5%; text-align: center; }
        .my-heading { font-size: 2.5rem; margin-bottom: 2rem; color: #1E3A8A; }
        .my-row { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; }
        .my-col { flex: 1; min-width: 300px; }
        .my-card { background: linear-gradient(135deg, #3B82F6, #1E40AF); padding: 2rem; border-radius: 20px; color: white; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 10px 30px rgba(59,130,246,0.3); }
        .my-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(59,130,246,0.5); }
        .icon { font-size: 3.5rem; margin-bottom: 1rem; color: #FFD700; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .menu { position: fixed; top: 70px; right: -100%; width: 100%; height: calc(100vh - 70px); background: linear-gradient(180deg, #1E3A8A, #0EA5E9); flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
            .menu.active { right: 0; }
            .hero { justify-content: flex-start; padding-top: 5rem; }
            .intro h1 { font-size: 2.5rem; }
            .my-row { flex-direction: column; }
        }
    </style>
</head>
<body style="background-color:rgb(196, 143, 161)">
    <header class="header">
        <nav class="navbar">
            <div class="logo"><h2><i class="fas fa-baseball-ball"></i> Royal Cricket Club</h2></div>
           
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
                <i class="fas fa-times" style="display:none;"></i>
            </div>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="intro">
            <img src="images/234.jpeg" alt="this image not available" width="300px" style="background-color:saddlebrown;">
            <br>
            <br>
            <h3 style="color:yellow;">Welcome to</h3>
            <h1>Royal Cricket Club</h1>
            <p>Participate & Win The Trophy</p>
            <button class="btn common-btn"><a href="cricketclub5 (1).html">Register now</a></button>
            

            
        </div>
    </section>

    

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        hamburger.addEventListener('click', () => {
            menu.classList.toggle('active');
            const bars = hamburger.querySelector('.fa-bars');
            const cross = hamburger.querySelector('.fa-times');
            bars.style.display = bars.style.display === 'none' ? 'block' : 'none';
            cross.style.display = cross.style.display === 'none' ? 'block' : 'none';
        });
    </script>
</body>
</html>
